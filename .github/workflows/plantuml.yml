name: Generate PlantUML Diagrams
on:
  push:
    paths:
      - 'docs/diagrams/*.puml'
      - '.github/workflows/plantuml.yml'
  pull_request:
    paths:
      - 'docs/diagrams/*.puml'

jobs:
  generate-diagrams:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed for git diff

      - name: Set up PlantUML
        run: |
          sudo apt-get update
          sudo apt-get install -y plantuml graphviz

      - name: List source files
        run: |
            echo "Checking for .puml files:"
            ls -la docs/diagrams/*.puml || echo "No .puml files found"

      - name: Generate diagrams
        run: |
            mkdir -p docs/diagrams/generated
            plantuml -tpng docs/diagrams/*.puml -output docs/diagrams/generated
            plantuml -tsvg docs/diagrams/*.puml -output docs/diagrams/generated
        
            # Debugging commands:
            echo "Generated files:"
            ls -la docs/diagrams/generated/
            echo "PlantUML version:"
            plantuml -version
        
      - name: Commit and push changes
        if: github.ref == 'refs/heads/main'
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # This grants write access
        run: |
            git config --global user.name "GitHub Actions"
            git config --global user.email "actions@github.com"
            git remote set-url origin https://x-access-token:$GITHUB_TOKEN@github.com/${{ github.repository }}.git
            git add -f docs/diagrams/generated/
            git diff --quiet && git diff --staged --quiet || git commit -m "[Automated] Update PlantUML diagrams"
            git push origin main